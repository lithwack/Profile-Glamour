<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 1 1">
  <defs>
    <mask id="custom-mask" maskContentUnits="objectBoundingBox" viewBox="0 0 1 1">
      <circle fill="white" cx="0.5" cy="0.5" r="0.5" />
      <rect fill="black" x="0.675" y="0.575" width="0.3" height="0.4" rx="0.09" ry="0.09" />
    </mask>
  </defs>

  <!-- This shows a blue square with the mask applied -->
  <rect width="1" height="1" fill="blue" mask="url(#thinner-mobile-status-mask)" />
</svg>
